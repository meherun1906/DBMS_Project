<!DOCTYPE html>
<html>
<head>
<style>

body {
  font-family: Arial;
  margin: 0;
}

/* Navbar */
ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background-color: #cf5555;
}

ul li {
  float: left;
}

ul li a {
  display: block;
  color: white;
  padding: 14px 16px;
  text-decoration: none;
}

ul li a:hover {
  background-color: #a94444;
}

/* Title */
h1 {
  text-align: center;
  margin-top: 20px;
}

/* Center form */
.form-container {
  width: 300px;
  margin: 30px auto; /* centers horizontally */
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

/* Inputs */
input[type="text"] {
  width: 100%;
  padding: 8px;
  margin: 5px 0 15px;
}

/* Button */
input[type="submit"] {
  width: 100%;
  padding: 10px;
  background-color: #cf5555;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

input[type="submit"]:hover {
  background-color: #a94444;
}

</style>
</head>

<body>

<h1>Breeding Programs</h1>


<div class="form-container">
  <form action="breedingPrograms.html"> 
    
    <label for="programid">Program ID:</label><br>
    <input type="text" id="programid" name="programid"><br>

    <label for="maiting_pairs">Maiting Pairs:</label><br>
    <input type="text" id="maiting_pairs" name="maiting_pairs"><br>

    <label for="nestingdate">Nesting Date:</label><br>
    <input type="text" id="nestingdate" name="nestingdate"><br>

    <label for="eggcount">Egg Count:</label><br>
    <input type="text" id="eggcount" name="eggcount"><br>
    
    <label for="incubationdate">Incubation Date:</label><br>
    <input type="text" id="incubationdate" name="incubationdate"><br>

    <label for="successrate">Success Rate:</label><br>
    <input type="text" id="successrate" name="successrate"><br>

    <label for="observations">Observations:</label><br>
    <input type="text" id="observations" name="observations"><br>

    <input type="submit" value="Submit">
  </form>
</div>

</body>
</html>
