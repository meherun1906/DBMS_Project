<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial;
}

h2, p {
  margin: 10px;
}

ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background-color: #cf5555;
}

ul li {
  float: left;
}

ul li a {
  display: block;
  color: white;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
}

ul li a:hover {
  background-color: #640f07cd;
}
.header-section {
  text-align: center;
  margin-top: 20px;
}

.header-section img {
  display: block;
  margin: 0 auto;
}

.header-section h2 {
  margin: 10px 0;
}

.header-section p {
  margin: 5px 0;
}
.chart-container {
  width: 55%;
  margin: 20px auto;
}

.row {
  display: flex;
  justify-content: space-around;
  flex-wrap: wrap;
}

.chart-box {
  width: 45%;
  margin: 20px 0;
}
</style>
</head>

<body>

<ul>
  <li><a href="Home.html">Home</a></li>
  <li><a href="Administrator.html">Administrator</a></li>
  <li><a href="Caretaker.html">Caretaker</a></li>
  <li><a href="Veterinarian.html">Veterinarian</a></li>
</ul>

<div class="header-section">
  <img src="logo.png" width="80">
  <h2>Not So Slow & Steady</h2>

  <p>Welcome to the Not So Slow & Steady Management System — where things move slowly, but the data moves fast.</p> 
  <p>Because even the slowest creatures deserve fast management.</p>

  <p>Thank You</p>
</div>

<div class="chart-container">

  <div class="row">
    <div class="chart-box">
      <canvas id="healthChart"></canvas>
    </div>
    <div class="chart-box">
      <canvas id="waterChart"></canvas>
    </div>
    
  </div>

  <div class="row">
    <div class="chart-box">
      <canvas id="humidityChart"></canvas>
    </div>
    <div class="chart-box">
      <canvas id="tempChart"></canvas>
    </div>
  
  </div>
</div>

<script>

new Chart(document.getElementById("healthChart"), {
  type: 'pie',
  data: {
    labels: ["Healthy", "Injured", "Recovered", "Overweight"],
    datasets: [{
      data: [3, 1, 1, 1]
    }]
  },
  options: {
    plugins: {
      title: {
        display: true,
        text: "Tortoise Health Status"
      }
    }
  }
});

new Chart(document.getElementById("waterChart"), {
  type: 'pie',
  data: {
    labels: ["Clean", "Dirty"],
    datasets: [{
      data: [3, 2]
    }]
  },
  options: {
    plugins: {
      title: {
        display: true,
        text: "Water Quality Status"
      }
    }
  }
});

new Chart(document.getElementById("tempChart"), {
  type: 'bar',
  data: {
    labels: ["Enclosure A", "Enclosure B", "Enclosure C", "Enclosure D"],
    datasets: [{
      label: "Temperature (°C)",
      data: [30, 32, 29, 28]
    }]
  },
  options: {
    plugins: {
      title: {
        display: true,
        text: "Temperature per Enclosure"
      }
    }
  }
});

new Chart(document.getElementById("humidityChart"), {
  type: 'line',
  data: {
    labels: ["Mar 20", "Mar 21", "Mar 22", "Mar 23", "Mar 24"],
    datasets: [{
      label: "Humidity (%)",
      data: [45, 50, 48, 60, 55],
      fill: false
    }]
  },
  options: {
    plugins: {
      title: {
        display: true,
        text: "Humidity Over Time"
      }
    }
  }
});

</script>

</body>
</html>
