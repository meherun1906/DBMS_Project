<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Monitoring</title>

<style>

body {
  font-family: Arial;
  margin: 0;
}

/* Navbar */
.navbar {
  background-color: #cf5555;
  display: flex;
  align-items: center;
  padding: 10px 20px;
}

.logo {
  width: 45px;
  margin-right: 15px;
}

/* Navbar link */
.navbar a {
  color: white;
  text-decoration: none;
  font-weight: bold;
  padding: 10px;
}

.navbar a:hover {
  background-color: #a94444;
  border-radius: 5px;
}

/* Container */
.container {
  width: 80%;
  margin: 30px auto;
}

/* Top bar */
.top-bar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

/* Buttons */
.button {
  background-color: #cf5555;
  color: white;
  padding: 10px 20px;
  text-decoration: none;
  border-radius: 5px;
}

.button:hover {
  background-color: #a94444;
}

.btn {
  background-color: #cf5555;
  color: white;
  border: none;
  padding: 5px 10px;
  margin: 2px;
  border-radius: 5px;
  cursor: pointer;
}

.btn:hover {
  background-color: #a94444;
}

/* Table */
table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background-color: #cf5555;
  color: white;
  padding: 10px;
}

td {
  border: 1px solid #ddd;
  padding: 10px;
  text-align: center;
}

tr:hover {
  background-color: #f2f2f2;
}

/* Search */
#myInput {
  width: 70%;
  padding: 10px;
  border: 1px solid #ddd;
}

h1 {
  text-align: center;
}
* {
  box-sizing: border-box;
}

#myInput {
  background-image: url('/css/searchicon.png');
  background-position: 10px 10px;
  background-repeat: no-repeat;
  width: 100%;
  font-size: 16px;
  padding: 12px 20px 12px 40px;
  border: 1px solid #ddd;
  margin-bottom: 12px;
}

#myTable {
  border-collapse: collapse;
  width: 100%;
  border: 1px solid #ddd;
  font-size: 18px;
}

#myTable th, #myTable td {
  text-align: left;
  padding: 12px;
}

#myTable tr {
  border-bottom: 1px solid #ddd;
}

#myTable tr.header, #myTable tr:hover {
  background-color: #f1f1f1;
}

</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <a href="Veterinarian.html"> Back to Dashboard</a>
</div>

<div class="container">

<h1>Health Records</h1>

<table>
      <td><input type="text" id="myInput" onkeyup="myFunction()" placeholder="Search ID" title="Type in ID"></td>
      <td><a href="form_healthRecords.html" class="button">Add</a></td>
  </table>

<table id="myTable">
<tr>
<th>ID</th>
<th>Tortoise</th>
<th>Status</th>
<th>Date</th>
<th>Action</th>
</tr>

<tr>
<td>R001</td>
<td>T1</td>
<td>Healthy</td>
<td>2026-03-01</td>
<td>
    <a href="form_healthRecords.html"><button class="btn">Edit</button></a>
    <button class="btn">Delete</button>
    </td>
</tr>

<tr>
<td>R002</td>
<td>T2</td>
<td>Under Treatment</td>
<td>2026-03-02</td>
<td>
    <a href="form_healthRecords.html"><button class="btn">Edit</button></a>
    <button class="btn">Delete</button>
    </td>
</tr>
</tr>

</table>

<script>
function myFunction() {
  var input, filter, table, tr, td, i, txtValue;
  input = document.getElementById("myInput");
  filter = input.value.toUpperCase();
  table = document.getElementById("myTable");
  tr = table.getElementsByTagName("tr");
  for (i = 0; i < tr.length; i++) {
    td = tr[i].getElementsByTagName("td")[0];
    if (td) {
      txtValue = td.textContent || td.innerText;
      if (txtValue.toUpperCase().indexOf(filter) > -1) {
        tr[i].style.display = "";
      } else {
        tr[i].style.display = "none";
      }
    }       
  }
}
</script>

</body>
</html>
