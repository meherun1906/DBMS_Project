<!DOCTYPE html>
<html>
<head>
<style>

body {
  font-family: Arial;
  margin: 0;
}

/* Navbar */
ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background-color: #cf5555;
}

ul li {
  float: left;
}

ul li a {
  display: block;
  color: white;
  padding: 14px 16px;
  text-decoration: none;
}

ul li a:hover {
  background-color: #a94444;
}

/* Title */
h1 {
  text-align: center;
  margin-top: 20px;
}

/* Center form */
.form-container {
  width: 300px;
  margin: 30px auto; /* centers horizontally */
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

/* Inputs */
input[type="text"] {
  width: 100%;
  padding: 8px;
  margin: 5px 0 15px;
}

/* Button */
input[type="submit"] {
  width: 100%;
  padding: 10px;
  background-color: #cf5555;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

input[type="submit"]:hover {
  background-color: #a94444;
}

</style>
</head>

<body>

<h1>Assign Task</h1>

<div class="form-container">
  <form action="assign_Task.html"> 
    
    <label for="task_id">Task ID:</label><br>
    <input type="text" id="task_id" name="task_id"><br>

    <label for="s_id">Staff ID:</label><br>
    <input type="text" id="s_id" name="s_id"><br>

    <label for="task">Task:</label><br>
    <input type="text" id="task" name="task"><br>

    <label for="assigned_date">Assigned Date:</label><br>
    <input type="text" id="assigned_date" name="assigned_date"><br>

    <label for="status">Task Status:</label><br>
    <input type="text" id="status" name="status"><br>



    <input type="submit" value="Submit">
  </form>
</div>

</body>
</html>
