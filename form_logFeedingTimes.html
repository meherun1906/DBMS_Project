<!DOCTYPE html>
<html>
<head>
<style>

body {
  font-family: Arial;
  margin: 0;
}

/* Navbar */
ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background-color: #cf5555;
}

ul li {
  float: left;
}

ul li a {
  display: block;
  color: white;
  padding: 14px 16px;
  text-decoration: none;
}

ul li a:hover {
  background-color: #a94444;
}

/* Title */
h1 {
  text-align: center;
  margin-top: 20px;
}

/* Center form */
.form-container {
  width: 300px;
  margin: 30px auto; /* centers horizontally */
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

/* Inputs */
input[type="text"] {
  width: 100%;
  padding: 8px;
  margin: 5px 0 15px;
}

/* Button */
input[type="submit"] {
  width: 100%;
  padding: 10px;
  background-color: #cf5555;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

input[type="submit"]:hover {
  background-color: #a94444;
}

</style>
</head>

<body>

<h1>Log Feeding Times</h1>


<div class="form-container">
  <form action="log_FeedingTimes.html"> 
    
    <label for="feedingid">Feeding ID:</label><br>
    <input type="text" id="feedingid" name="feedingid"><br>

    <label for="caretakerid">Caretaker ID:</label><br>
    <input type="text" id="caretakerid" name="caretakerid"><br>

    <label for="caretakername">Caretaker Name:</label><br>
    <input type="text" id="caretakerid" name="caretakerid"><br>

    <label for="tortoiseid">Tortoise ID:</label><br>
    <input type="text" id="tortoiseid" name="tortoiseid"><br>

    <label for="foodtype">Food Type:</label><br>
    <input type="text" id="foodtype" name="foodtype"><br>
    
    <label for="feedingtime">Feeding Time:</label><br>
    <input type="text" id="feedingtime" name="feedingtime"><br>

    <input type="submit" value="Submit">
  </form>
</div>

</body>
</html>
